<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Inventory Check</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<style>
body{font-family:Arial;text-align:center;margin-top:10px}
input{font-size:14px;padding:10px;width:300px;margin:5px}
</style>

</head>

<body>
<div id="result"></div>
=== Tracking Number ===<br>
<input id="loc" autofocus>

<script>

    function playSuccessSound() {
      const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      const oscillator = audioCtx.createOscillator();
      const gainNode = audioCtx.createGain();

      oscillator.type = "sine";
      oscillator.frequency.setValueAtTime(880, audioCtx.currentTime);
      gainNode.gain.setValueAtTime(0.2, audioCtx.currentTime);

      oscillator.connect(gainNode);
      gainNode.connect(audioCtx.destination);

      oscillator.start();
      oscillator.stop(audioCtx.currentTime + 0.15);
    }

    function playErrorSound() {
      const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      const oscillator = audioCtx.createOscillator();
      const gainNode = audioCtx.createGain();

      oscillator.type = "square";
      oscillator.frequency.setValueAtTime(300, audioCtx.currentTime);
      gainNode.gain.setValueAtTime(0.2, audioCtx.currentTime);

      oscillator.connect(gainNode);
      gainNode.connect(audioCtx.destination);

      oscillator.start();
      oscillator.stop(audioCtx.currentTime + 0.25);
    }

function playOKVoice(){
  const msg = new SpeechSynthesisUtterance("OK");
  msg.lang = "en-US";
  msg.rate = 1.2;
  msg.pitch = 1;
  speechSynthesis.speak(msg);
}
    
let currentLoc=""

let api="https://script.google.com/macros/s/AKfycbzpvcZIkVx0R2a9ib6_tR67Q6Sq3r2tg8n7JWeJSpdw5O8-4eM-dEo4Vcdwauwn75fd/exec"

document.getElementById("loc").addEventListener("change",function(){

  let trackingno=this.value

  fetch(api,{
    method:"POST",
    body:JSON.stringify({
      trackingno:trackingno,
    })
  })

  //this.value=""
  //document.getElementById("loc").value=""
  document.getElementById("loc").select()
  document.getElementById("result").innerHTML="<font color='red'>OK</font><br/>";
  playSuccessSound();
})

</script>

</body>
</html>
