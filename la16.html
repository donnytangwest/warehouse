<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Inventory Check</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<style>
body{font-family:Arial;text-align:center;margin-top:80px}
input{font-size:28px;padding:10px;width:300px;margin:20px}
</style>

</head>

<body>

<h2>Inventory Check</h2>

Location<br>
<input id="loc" autofocus>

<br>

SKU<br>
<input id="sku">

<script>

  function playSuccessSound() {
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const oscillator = audioCtx.createOscillator();
    const gainNode = audioCtx.createGain();

    oscillator.type = "sine";
    oscillator.frequency.setValueAtTime(880, audioCtx.currentTime);
    gainNode.gain.setValueAtTime(0.2, audioCtx.currentTime);

    oscillator.connect(gainNode);
    gainNode.connect(audioCtx.destination);

    oscillator.start();
    oscillator.stop(audioCtx.currentTime + 0.15);
  }


let currentLoc=""

let api="https://script.google.com/macros/s/AKfycbxvwT0Zc_pqNuPSZtor76qcY9zYTK5mmEKm8FMFWkvhWqQHrauUR3wZEQPnAlRrYymi/exec"

document.getElementById("loc").addEventListener("change",function(){

currentLoc=this.value
document.getElementById("sku").focus()

})

document.getElementById("sku").addEventListener("change",function(){

let sku=this.value

fetch(api,{
method:"POST",
body:JSON.stringify({
location:currentLoc,
sku:sku,
qty:1
})
})

this.value=""
document.getElementById("loc").value=""
document.getElementById("loc").focus()
playSuccessSound();

})

</script>

</body>
</html>
